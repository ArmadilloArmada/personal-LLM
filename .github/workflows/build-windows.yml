name: Build Persona Windows .exe

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build .exe
        run: pyinstaller persona.spec --noconfirm

      - name: Add Windows readme
        run: |
          copy windows\README.txt dist\Persona\README.txt
          copy "windows\Run Persona.bat" "dist\Persona\Run Persona.bat"

      - name: Smoke test Persona.exe
        shell: pwsh
        working-directory: dist/Persona
        run: |
          $env:PERSONA_PROVIDER = "demo"
          $env:PERSONA_NO_MSGBOX = "1"
          $exe = Join-Path $PWD "Persona.exe"
          if (-not (Test-Path $exe)) { throw "Persona.exe not found" }
          $proc = Start-Process -FilePath $exe -WorkingDirectory $PWD -PassThru
          $deadline = (Get-Date).AddSeconds(45)
          $ok = $false
          while ((Get-Date) -lt $deadline) {
            if ($proc.HasExited) {
              $log = "$env:USERPROFILE\.persona\error.log"
              if (Test-Path $log) { Get-Content $log }
              $startup = "$env:USERPROFILE\.persona\startup.log"
              if (Test-Path $startup) { Get-Content $startup }
              throw "Persona.exe exited with code $($proc.ExitCode)"
            }
            try {
              $resp = Invoke-WebRequest -Uri "http://127.0.0.1:8765/api/status" -UseBasicParsing -TimeoutSec 2
              if ($resp.StatusCode -eq 200) { $ok = $true; break }
            } catch {}
            Start-Sleep -Seconds 1
          }
          if (-not $ok) {
            $log = "$env:USERPROFILE\.persona\error.log"
            if (Test-Path $log) { Get-Content $log }
            $startup = "$env:USERPROFILE\.persona\startup.log"
            if (Test-Path $startup) { Get-Content $startup }
            throw "Server did not respond on port 8765 within 45s"
          }
          Write-Host "Smoke test passed on port 8765"
          Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          Get-Process -Name "Persona" -ErrorAction SilentlyContinue | Stop-Process -Force

      - name: Zip portable app
        run: |
          Compress-Archive -Path dist/Persona -DestinationPath dist/Persona-Windows-portable.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Persona-Windows
          path: |
            dist/Persona-Windows-portable.zip
            dist/Persona/Persona.exe

      - name: Publish GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Persona-Windows-portable.zip
          generate_release_notes: true
