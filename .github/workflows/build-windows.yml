name: Build Persona + Big Brain (Windows)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Persona and run tests
        run: |
          python -m pip install --upgrade pip
          pip install -e "./persona-app[desktop,dev]"
          python -m pytest persona-app/tests -q

  build-windows:
    needs: test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Big Brain
        run: |
          npm install --prefix big-brain
          npm run build --prefix big-brain

      - name: Install Persona
        run: |
          python -m pip install --upgrade pip
          pip install -e "./persona-app[desktop]"
          pip install pyinstaller

      - name: Build Persona.exe with Brain bundle
        env:
          BIG_BRAIN_CLIENT_DIST: ${{ github.workspace }}/big-brain/client/dist
          BIG_BRAIN_SERVER_ENTRY: ${{ github.workspace }}/big-brain/server/dist/index.js
        run: pyinstaller persona-app/persona.spec --noconfirm

      - name: Bundle Big Brain + Node into portable
        shell: pwsh
        run: |
          $dist = "dist/Persona"
          New-Item -ItemType Directory -Force -Path "$dist/brain/client", "$dist/brain/server", "$dist/node" | Out-Null
          Copy-Item -Recurse -Force "big-brain/client/dist" "$dist/brain/client/"
          Copy-Item -Recurse -Force "big-brain/server/dist" "$dist/brain/server/"
          Copy-Item "big-brain/server/package.json" "$dist/brain/server/package.json"
          Push-Location "$dist/brain/server"
          npm install --omit=dev --no-package-lock
          if ($LASTEXITCODE -ne 0) { throw "npm install failed for Brain server runtime" }
          Pop-Location
          $nodeDir = (Get-Command node).Source | Split-Path -Parent
          Copy-Item "$nodeDir/node.exe" "$dist/node/node.exe"
          Copy-Item persona-app/windows/README.txt "$dist/README.txt" -ErrorAction SilentlyContinue
          Copy-Item "persona-app/windows/Run Persona.bat" "$dist/Run Persona.bat" -ErrorAction SilentlyContinue
          Copy-Item "persona-app/windows/Create Desktop Shortcut.bat" "$dist/Create Desktop Shortcut.bat" -ErrorAction SilentlyContinue

      - name: Smoke test Persona.exe
        shell: pwsh
        working-directory: dist/Persona
        run: |
          $env:PERSONA_PROVIDER = "demo"
          $env:PERSONA_NO_MSGBOX = "1"
          $exe = Join-Path $PWD "Persona.exe"
          if (-not (Test-Path $exe)) { throw "Persona.exe not found" }
          $proc = Start-Process -FilePath $exe -WorkingDirectory $PWD -PassThru -NoNewWindow
          $deadline = (Get-Date).AddSeconds(90)
          $ok = $false
          while ((Get-Date) -lt $deadline) {
            if ($proc.HasExited) {
              $log = "$env:USERPROFILE\.persona\error.log"
              if (Test-Path $log) { Get-Content $log }
              throw "Persona.exe exited with code $($proc.ExitCode)"
            }
            try {
              $health = curl.exe -s -o NUL -w "%{http_code}" "http://127.0.0.1:8765/api/health"
              if ($health -eq "200") {
                curl.exe -s -X POST "http://127.0.0.1:8765/api/brain/start" | Out-Null
                $brain = curl.exe -s -o NUL -w "%{http_code}" "http://127.0.0.1:8765/api/brain/status"
                if ($brain -eq "200") { $ok = $true; break }
              }
            } catch {}
            Start-Sleep -Seconds 1
          }
          if (-not $ok) { throw "Server did not respond within 90s" }
          $startup = Get-Content "$env:USERPROFILE\.persona\startup.log" -Raw
          if ($startup -notmatch "opened Edge/Chrome app window") {
            throw "startup.log missing successful window launch line"
          }
          Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue

      - name: Build Windows installer
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $version = "${{ github.ref_name }}" -replace '^v',''
          if (-not $version) { $version = "1.1.0" }
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "persona-app\windows\persona.iss" "/DMyAppVersion=$version"
          Copy-Item -Force "persona-app\windows\Output\Persona-Setup.exe" "dist\Persona-Setup.exe"

      - name: Zip portable app
        run: Compress-Archive -Path dist/Persona -DestinationPath dist/Persona-Windows-portable.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Persona-Windows
          path: |
            dist/Persona-Windows-portable.zip
            dist/Persona-Setup.exe

      - name: Publish GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Persona-Windows-portable.zip
            dist/Persona-Setup.exe
          generate_release_notes: true
